user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile          on;
    keepalive_timeout 65;
    server_tokens     off;

    gzip         on;
    gzip_vary    on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # Shared security header values
    map $uri $csp {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' stats.seatsurfing.io; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' stats.seatsurfing.io app.seatsurfing.io; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
    }

    server {
        listen 80;
        server_name _;
        root  /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options            "DENY"                                                                                    always;
        add_header X-Content-Type-Options     "nosniff"                                                                                 always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"                                                         always;
        add_header Content-Security-Policy    $csp                                                                                      always;
        add_header Permissions-Policy         "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin"                                                                             always;

        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        # Long-term caching for content-hashed static assets
        location ~* \.(?:js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 1y;
            # add_header resets inherited headers in this location block, so repeat them
            add_header Cache-Control          "public, immutable";
            add_header X-Frame-Options        "DENY"                                                                                    always;
            add_header X-Content-Type-Options "nosniff"                                                                                 always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin"                                                         always;
            add_header Content-Security-Policy $csp                                                                                      always;
            add_header Permissions-Policy         "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin"                                                                         always;
        }

        error_page 404 /404.html;
    }
}
